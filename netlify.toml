# ── Configuração do Netlify ──────────────────────────────────
# Hospeda o frontend estático (HTML/CSS/JS)
# O backend (Node.js) deve estar no Railway

[build]
  publish = "."      # raiz do projeto = pasta a publicar
  ignore = "server/" # ignora a pasta do servidor

# Redireciona / para login.html
[[redirects]]
  from = "/"
  to   = "/login.html"
  status = 302

# Headers de segurança
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# Cache longo para assets com hash (CSS/JS)
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
